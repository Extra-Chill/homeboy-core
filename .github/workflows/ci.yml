name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Lint (runs first, owns all code-style autofix) ──
  # Lint is the only job that pushes autofix commits for formatting and
  # clippy fixes. If it pushes a fix, the App token triggers a full CI
  # re-run where test and audit see the already-fixed code.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: lint
          autofix: 'true'
          autofix-mode: 'on-failure'
          autofix-max-commits: '3'
          app-token: ${{ steps.app-token.outputs.token || '' }}

  # ── Test (runs after lint passes) ──
  # No autofix — lint already handled formatting and clippy.
  # If tests fail, that's a real failure requiring human attention.
  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: test

  # ── Homeboy audit (runs after lint passes) ──
  # Uses source build mode to compile from the PR branch, avoiding the
  # chicken-and-egg problem of needing a released binary to audit itself.
  # Falls back to latest release binary if source build fails.
  # Autofix mode "always": runs autofix on every PR (not just failures),
  # so the baseline auto-ratchets as the factory eliminates fixable findings.
  # App token: autofix pushes use the GitHub App token so CI re-triggers.
  audit:
    name: Homeboy Audit
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: audit
          autofix: 'true'
          autofix-mode: 'always'
          autofix-commands: 'audit --fix --write'
          autofix-max-commits: '3'
          app-token: ${{ steps.app-token.outputs.token || '' }}
