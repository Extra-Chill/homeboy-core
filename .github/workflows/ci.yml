# PR quality pipeline.
#
# Strict serial pipeline: lint+fix → test+fix → audit+fix
# Each stage fixes what it can and commits back. If anything was fixed,
# the App token push triggers a full re-run to verify the fixes.
# Scoped to changed files only (--changed-since / lint-changed-only).

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Stage 1: Lint + Fix ──
  # Runs cargo fmt and clippy. Autofixes formatting and clippy warnings.
  # If fixes are committed, App token push triggers re-run of all stages.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: lint
          autofix: 'true'
          autofix-mode: 'on-failure'
          autofix-max-commits: '3'
          app-token: ${{ steps.app-token.outputs.token || '' }}

  # ── Stage 2: Test + Fix ──
  # Runs after lint passes. If tests fail and fixes are available,
  # commits and triggers re-run.
  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: test
          autofix: 'true'
          autofix-mode: 'on-failure'
          autofix-max-commits: '3'
          app-token: ${{ steps.app-token.outputs.token || '' }}

  # ── Stage 3: Audit + Fix ──
  # Runs after test passes. Autofix mode "always" — grinds down the
  # baseline on every PR, not just failures.
  # Uses source build so the audit binary matches the PR code.
  audit:
    name: Audit
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: audit
          autofix: 'true'
          autofix-mode: 'always'
          autofix-commands: 'audit --fix --write'
          autofix-max-commits: '3'
          app-token: ${{ steps.app-token.outputs.token || '' }}
