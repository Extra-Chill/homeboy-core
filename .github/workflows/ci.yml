name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: lint
          autofix: 'true'
          autofix-mode: 'on-failure'
          autofix-max-commits: '2'
          app-token: ${{ steps.app-token.outputs.token || '' }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: test
          autofix: 'true'
          autofix-mode: 'on-failure'
          autofix-max-commits: '2'
          app-token: ${{ steps.app-token.outputs.token || '' }}

  # ── Homeboy audit (dogfooding via homeboy-action) ──
  # Uses source build mode to compile from the PR branch, avoiding the
  # chicken-and-egg problem of needing a released binary to audit itself.
  # Falls back to latest release binary if source build fails.
  # Runs independently of build job so PR comments are always posted.
  # Autofix mode "always": runs autofix on every PR (not just failures),
  # so the baseline auto-ratchets as the factory eliminates fixable findings.
  # App token: autofix pushes use the GitHub App token so CI re-triggers on the new commit.
  audit:
    name: Homeboy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: Extra-Chill/homeboy-action@v1
        with:
          source: '.'
          extension: rust
          component: homeboy
          commands: audit
          autofix: 'true'
          autofix-mode: 'always'
          autofix-commands: 'audit --fix --write'
          autofix-max-commits: '2'
          app-token: ${{ steps.app-token.outputs.token || '' }}
